<h1>Posts</h1>
<a routerLink="new">Create Post</a>

@if (posts.hasValue()) {
  @for (post of posts.value(); track post.id) {
    <article>
      <h2>
        <a [routerLink]="[post.id]">{{ post.title }}</a>
      </h2>
      <p>{{ post.content }}</p>
    </article>
  }
} @else if (posts.error()) {
  <div>Could not load posts</div>
} @else if (posts.isLoading()) {
  <div>Loading posts...</div>
}
